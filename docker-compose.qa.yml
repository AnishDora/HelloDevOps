services:
  backend:
    image: ghcr.io/anishdora/hellodevops-backend:qa
    env_file:
      - ./server/.env
    depends_on:
      - db

  frontend:
    image: ghcr.io/anishdora/hellodevops-frontend:qa
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: mysql:8
    env_file:
      - ./.env