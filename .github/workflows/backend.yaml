name: Backend Check

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "server/**"

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Start server (test run)
        run: node index.js &
      
      - name: Wait for server
        run: sleep 5