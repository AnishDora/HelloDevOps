name: Docker Build Check

on:
  push:
    paths:
      - "client/**"
      - "server/**"
      - "docker-compose.yml"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "client/**"
      - "server/**"

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build